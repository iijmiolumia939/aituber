name: Bug report
description: Report a bug with steps and logs
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redacted)
      description: Please redact tokens/PII.
    validations:
      required: false
  - type: textarea
    id: srs
    attributes:
      label: SRS references (optional)
      placeholder: FR- / NFR- / TC-
    validations:
      required: false
