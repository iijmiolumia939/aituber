version: 1
project:
  name: "AI YouTube Streaming Host"
  scope:
    now: ["talk", "comment_interaction", "avatar_control"]
    later: ["game_playing:Terraria"]
  platforms:
    orchestrator: "Python 3.11+"
    avatar:
      primary: "Unity (VRM)"
      fallback: "Live2D (Cubism)"
  ide:
    primary: "VS Code"
    notes: ["Unity is a thin renderer; Orchestrator is the brain."]

fr:
  - id: FR-A3-01
    title: "YouTube LiveChat polling"
    srs_ref: "A-3"
    description: "Poll live chat using YouTube Data API and respect pollingIntervalMillis."
    acceptance:
      - "Uses LiveChatMessages.list polling; waits at least pollingIntervalMillis (clamped) between calls."
      - "Bounded retries with exponential backoff."
  - id: FR-A3-02
    title: "Dedupe and TTL"
    srs_ref: "A-3"
    description: "Deduplicate chat messages and prevent unbounded growth."
    acceptance:
      - "seen_set TTL 30 minutes"
      - "seen_set capacity <= 100000 IDs; evict oldest/expired"
  - id: FR-A3-03
    title: "Summary mode under burst"
    srs_ref: "A-3"
    description: "When chat rate spikes, switch to summarize_cluster behavior."
    acceptance:
      - "If chat_rate_15s >= 10, enable summary mode"
      - "Summarize clustered comments and respond"
  - id: FR-SAFE-01
    title: "Safety filter ordering"
    srs_ref: "Appendix E"
    description: "Safety Filter runs before Bandit and LLM."
    acceptance:
      - "NG-confirmed comments never reach Bandit/LLM"
  - id: FR-LLM-01
    title: "LLM API fallback"
    srs_ref: "Appendix E / FR-LLM-01"
    description: "If LLM API fails, continue with template mode."
    acceptance:
      - "Retry max 2"
      - "Then enter template mode without stopping speech"
  - id: FR-A7-01
    title: "Avatar WebSocket control"
    srs_ref: "A-7"
    description: "Control avatar via WS JSON thin client."
    acceptance:
      - "Endpoint ws://127.0.0.1:31900 default"
      - "Backward compatible: ignore unknown fields"
  - id: FR-LIPSYNC-01
    title: "RMS mouth_open lip sync"
    srs_ref: "A-7.5"
    description: "Send mouth_open 0..1 based on audio RMS."
    acceptance:
      - "During playback, update mouth_open at 30Hz"
  - id: FR-LIPSYNC-02
    title: "Viseme timeline lip sync"
    srs_ref: "A-7.11/A-7.12"
    description: "Optionally send avatar_viseme event timeline; Live2D must map."
    acceptance:
      - "events sorted by t_ms"
      - "crossfade_ms default 40..80"
  - id: FR-RL-01
    title: "Contextual bandit action selection"
    srs_ref: "Appendix D"
    description: "Bandit selects chat_action (reply/queue/summarize/ignore)."
    acceptance:
      - "Log each decision pre/post in bandit_log JSONL"
      - "Do not update model on safe=true outcomes"

  # ── Room / Environment system (FR-ROOM) ───────────────────────────────

  - id: FR-ROOM-01
    title: "Prefab-based room environment"
    srs_ref: "A-7 (rendering)"
    description: >
      3D 背景は Unity Prefab として管理する。
      各部屋は RoomDefinition (ScriptableObject) で識別・定義され、
      RoomManager が起動時に全 Prefab をインスタンス化（非アクティブ）、
      切り替え時に SetActive で表示/非表示を切り替える。
    acceptance:
      - "RoomDefinition に roomId / roomPrefab / cameraPosition / avatarPosition が定義できる"
      - "RoomManager.SwitchRoom(roomId) で任意の部屋に切り替えられる"
      - "切り替え時にカメラ位置・FOV・アバター位置が RoomDefinition の値に更新される"
      - "useFadeTransition=true のとき CanvasGroup フェードが実行される"
      - "[/] キーでデバッグ切り替えが可能"
    impl:
      - "Assets/Scripts/Room/RoomDefinition.cs (ScriptableObject)"
      - "Assets/Scripts/Room/RoomManager.cs (MonoBehaviour)"
      - "Assets/Rooms/ に Prefab・Definition・Materials を配置"
    deprecated:
      - "Assets/Scripts/AlchemistRoom.cs — プロシージャル生成方式は廃止（Start で自己無効化）"

  - id: FR-ROOM-02
    title: "Remote room switching via WebSocket"
    srs_ref: "A-7"
    description: >
      Orchestrator から `room_change` コマンドを受信し、
      AvatarController 経由で RoomManager.SwitchRoom() を呼び出す。
    acceptance:
      - "WS コマンド: { \"cmd\": \"room_change\", \"params\": { \"room_id\": \"<id>\" } }"
      - "存在しない room_id はログ警告のみ（クラッシュしない）"
      - "RoomManager が未配置の場合もログ警告のみ"
    wire_protocol:
      cmd: "room_change"
      params:
        room_id: "string — RoomDefinition.roomId と一致"
    impl:
      - "AvatarMessage.cs: RoomChangeParams・RoomChangeEnvelope 追加"
      - "AvatarController.cs: case 'room_change' → HandleRoomChange()"

  # ── Growth / ReflectionRunner (FR-REFL) ──────────────────────────────────

  - id: FR-REFL-01
    title: "Gap JSONL loading and filtering"
    srs_ref: "autonomous-growth.md M2"
    description: >
      ReflectionRunner がセッション後の capability_gaps/<stream_id>.jsonl を
      読み込み、GapEntry のリストとしてパースする。不正行はスキップ (警告ログ)。
      gap_category / priority_score によるフィルタリング・ソートをサポートする。
    acceptance:
      - "有効な JSONL → GapEntry dict のリストを返す"
      - "空ファイル → 空リストを返す（例外なし）"
      - "不正 JSON 行はスキップして残りを返す"
      - "存在しないファイル → FileNotFoundError を送出"
      - "filter_gaps(category=X) で gap_category が X のエントリのみ返す"
      - "sort_by_priority() が priority_score 降順に並び直し、入力を変更しない"
    impl:
      - "orchestrator/reflection_runner.py: load_gaps(), filter_gaps(), sort_by_priority()"
      - "tests/test_reflection_runner.py: TC-REFL-01〜08"

  - id: FR-REFL-02
    title: "LLM-Modulo Gap → Proposal generation"
    srs_ref: "autonomous-growth.md M2"
    description: >
      LLM-Modulo パターン (Kambhampati et al. 2024) に基づき、
      Gap リストをまとめてバッチプロンプトで LLM に入力し、
      behavior_policy.yml 追加エントリ案を YAML リスト形式で生成する。
      LLM エラーおよび YAML パースエラーは空リストを返して吸収する。
    acceptance:
      - "build_prompt() が Gap の intent 名を含むプロンプトを生成"
      - "複数 Gap を1回の LLM 呼び出しにまとめる"
      - "プロンプトが YAML 出力形式の指示を含む"
      - "モック LLM の YAML 応答から proposal dict を生成"
      - "LLM 例外発生時 → 空リストを返す（例外伝播なし）"
      - "空 YAML 応答 → 空リストを返す"
    impl:
      - "orchestrator/reflection_runner.py: build_prompt(), generate_proposals()"
      - "tests/test_reflection_runner.py: TC-REFL-04〜06"

  - id: FR-REFL-03
    title: "Proposal validation (schema + safety)"
    srs_ref: "autonomous-growth.md M2"
    description: >
      ProposalValidator が LLM 生成 proposal を検証する。
      必須フィールド・cmd アローリスト・intent 命名規約・安全ワードブロック・
      重複 intent チェックの5層を順に適用する。
    acceptance:
      - "intent・cmd が揃い、action フィールド1つ以上 → VALID"
      - "intent 欠落または空文字 → INVALID（'intent' が reason に含まれる）"
      - "cmd 欠落 → INVALID（'cmd' が reason に含まれる）"
      - "cmd が allowlist (avatar_update|avatar_event) 以外 → INVALID"
      - "gesture/emotion/look_target/event がすべて欠落 → INVALID"
      - "ブロックワード (exec, shutdown, delete_all, rm -rf 等) → INVALID"
      - "既存 intent と同名 → DUPLICATE"
      - "intent にスペースや ; & | → INVALID"
      - "snake_case intent → VALID"
    impl:
      - "orchestrator/proposal_validator.py: ProposalValidator.validate(), ValidationResult, ValidationStatus"
      - "tests/test_proposal_validator.py: TC-REFL-09〜15"

  - id: FR-REFL-04
    title: "behavior_policy.yml append"
    srs_ref: "autonomous-growth.md M2"
    description: >
      PolicyUpdater が検証済みエントリを behavior_policy.yml 末尾に追記する。
      ファイルが存在しない場合は新規作成する。追記件数を返す。
    acceptance:
      - "既存 YAML を読んで dict リストを返す (load_policy)"
      - "空ファイル → 空リストを返す"
      - "新エントリを末尾に追記し、追記件数を返す"
      - "空リスト渡し → 0 を返し、ファイルを変更しない"
      - "ファイルが存在しない場合は新規作成して追記"
    impl:
      - "orchestrator/policy_updater.py: PolicyUpdater.load_policy(), append_entries()"
      - "tests/test_proposal_validator.py: TC-REFL-16〜18"

  # ── Growth / GapDashboard (FR-DASH) ──────────────────────────────────────

  - id: FR-DASH-01
    title: "Capability Gap JSONL aggregation"
    srs_ref: "autonomous-growth.md M3"
    description: >
      GapDashboard が gaps_dir 以下の *.jsonl を再帰的に読み込み、
      gap_category / intended_action.name / stream_id ごとに件数を集計する。
      不正 JSON 行はスキップ（警告ログ）。ディレクトリ不在は空リストを返す。
    acceptance:
      - "全 *.jsonl ファイルを glob し、行ごとに JSON パースして結合"
      - "不正 JSON 行はスキップして残りを返す"
      - "存在しないディレクトリ → 空リストを返す（例外なし）"
      - "非 .jsonl ファイルは無視"
      - "aggregate_by_category() がカテゴリ別件数 dict を返す"
      - "aggregate_by_intent() が intent 名別件数 dict を返す"
      - "aggregate_by_stream() が stream_id 別件数 dict を返す"
    impl:
      - "orchestrator/gap_dashboard.py: GapDashboard.load_all_gaps()"
      - "orchestrator/gap_dashboard.py: GapDashboard.aggregate_by_category/intent/stream()"
      - "tests/test_gap_dashboard.py: TC-DASH-01〜06"

  - id: FR-DASH-02
    title: "Priority scoring and top-N gap surface"
    srs_ref: "autonomous-growth.md M3"
    description: >
      GapDashboard が intent ごとに priority_score を算出し、
      上位 N 件の代表 Gap エントリを返す CLI を提供する。
      priority_score = (freq / total_gaps) × (1 / cost_weight[gap_category])。
      スコアは [0.0, 1.0] に収まる。
    acceptance:
      - "高頻度 intent のスコアが低頻度 intent より高い"
      - "cost_weight が小さいカテゴリ（missing_motion=1.0）が高スコアになる"
      - "全 Gap が同一 intent の場合 score = 1.0"
      - "スコアは [0.0, 1.0] の範囲内"
      - "get_top_gaps(top_n=N) が N 件以内の intent 代表エントリを返す"
      - "category フィルタで gap_category を絞り込める"
      - "build_summary() が total_gaps / by_category / by_intent / top_gaps / streams を含む dict を返す"
    impl:
      - "orchestrator/gap_dashboard.py: GapDashboard.compute_priority_scores()"
      - "orchestrator/gap_dashboard.py: GapDashboard.get_top_gaps(), build_summary()"
      - "orchestrator/gap_dashboard.py: main() CLI"
      - "tests/test_gap_dashboard.py: TC-DASH-07〜12"
