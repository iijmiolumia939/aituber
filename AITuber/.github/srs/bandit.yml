version: 1
bandit:
  scopes:
    - name: "chat_action"
      actions: ["reply_now", "queue_and_reply_later", "summarize_cluster", "ignore"]
      context_features_min:
        - "t_since_last_reply_sec"
        - "chat_rate_15s"
      context_features_recommended:
        - "unique_authors_60s"
        - "is_summary_mode"
        - "topic_phase"
        - "silence_risk"
        - "viewer_sentiment_hint"
        - "safety_risk"
  reward:
    formula_version: "1.0"
    params:
      k: 0.10
      m: 0.05
      n: 0.10
      S: 5.0
      crossfade_ms_default: 60
    action_adjustments:
      summarize_cluster:
        bonus_if_summary_mode_and_delta_chat_nonnegative: 0.5
      ignore:
        base_if_safety_risk_high: 0.3
        base_otherwise: 0.0
  logging:
    format: "jsonl"
    pre_post: true
    retention_days: 90
    rotate_mb: 50
