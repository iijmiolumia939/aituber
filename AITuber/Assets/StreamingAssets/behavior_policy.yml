# ── M19: Daily Life — Sims-like autonomous activities (FR-LIFE-01) ──────────
# LifeScheduler が時刻+エネルギーに基づいて自律選択する活動インテント。
# behavior_start cmd → behaviors.json のシーケンスを実行（ゾーン移動+アニメ連鎖）。
# TC refs: TC-LIFE-01〜15

- intent: life_sleep
  cmd: behavior_start
  behavior_seq: go_sleep
  priority: 2
  notes: "就寝シーケンス: sleep_area へ歩いて sleep_idle。00:00-06:00 帯。FR-LIFE-01"

- intent: life_wake
  cmd: behavior_start
  behavior_seq: go_wake
  priority: 2
  notes: "起床シーケンス: ストレッチ → pc_area へ移動。06:00-07:00 帯。FR-LIFE-01"

- intent: life_eat
  cmd: behavior_start
  behavior_seq: go_eat
  priority: 2
  notes: "食事シーケンス: eat_area へ歩いて sit_eat。07-08 / 12-13 / 18-19 帯。FR-LIFE-01"

- intent: life_read
  cmd: behavior_start
  behavior_seq: go_read
  priority: 2
  notes: "読書シーケンス: read_area へ歩いて sit_read。08-12 / 16-18 帯。FR-LIFE-01"

- intent: life_tinker
  cmd: behavior_start
  behavior_seq: go_stream
  priority: 2
  notes: "作業シーケンス: pc_area へ歩いて sit_write。13-15 帯。FR-LIFE-01"

- intent: life_walk
  cmd: behavior_start
  behavior_seq: go_walk
  priority: 2
  notes: "室内散歩: walk → 4秒 → walk_stop。15-16 / 21-22 帯。FR-LIFE-01"

- intent: life_ponder
  cmd: avatar_update
  gesture: thinking
  emotion: thinking
  look_target: random
  priority: 2
  notes: "深い思索・哲学（単発ジェスチャー）。19-21 帯。FR-LIFE-01"

- intent: life_stretch
  cmd: behavior_start
  behavior_seq: go_stretch
  priority: 2
  notes: "夜のストレッチ。22-23 帯。FR-LIFE-01"


