<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap');
  :root {
    --ink: #3b2d43;
    --sub: #7f6a8d;
    --pink: #ff77b7;
    --mint: #31d7b5;
    --paper: rgba(255, 255, 255, 0.78);
    --line: rgba(122, 74, 108, 0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    width: 100vw;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 28px 0 28px;
    width: 100%;
    height: 100%;
    position: relative;
    background:
      radial-gradient(circle at 4% 0%, rgba(255,173,219,0.38), transparent 42%),
      radial-gradient(circle at 96% 8%, rgba(147,245,222,0.36), transparent 43%);
  }

  .header-row::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.38) 1.5px, transparent 1.5px);
    background-size: 18px 18px;
    opacity: 0.25;
    pointer-events: none;
  }

  /* Left: LIVE badge + stats */
  .stats-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(145deg, #ff7faf, #ff5ea8);
    border-radius: 16px;
    padding: 10px 22px;
    box-shadow: 0 6px 0 rgba(170, 44, 110, 0.35);
    width: fit-content;
    position: relative;
    overflow: hidden;
  }
  /* Shimmer sweep on LIVE badge */
  .live-badge::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    animation: live-shimmer 3.5s ease-in-out infinite;
  }
  @keyframes live-shimmer {
    0%      { left: -100%; }
    40%, 100% { left: 200%; }
  }
  .live-dot-wrap {
    position: relative;
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .live-dot {
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    position: relative; z-index: 1;
  }
  .live-dot-ring {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: dot-pulse 1.6s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50%       { transform: scale(1.7); opacity: 0; }
  }
  .live-text {
    color: #fff;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 3px;
  }

  .stat-panel {
    background: var(--paper);
    border-radius: 16px;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 6px 0 rgba(122, 74, 108, 0.2);
    border: 2px solid var(--line);
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stat-icon.viewers {
    background: linear-gradient(140deg, #ff77b7, #ff5ea8);
    box-shadow: none;
  }
  .stat-icon.subs {
    background: linear-gradient(140deg, #31d7b5, #1bc2a2);
    box-shadow: none;
  }
  .stat-label { color: var(--sub); font-size: 11px; letter-spacing: 0.03em; }
  .stat-value { color: var(--ink); font-weight: 900; font-size: 22px; line-height: 1; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }

  /* Center: Title */
  .title-bar {
    background: linear-gradient(135deg, rgba(255,119,183,0.96) 0%, rgba(255,165,209,0.94) 44%, rgba(49,215,181,0.9) 100%);
    border-radius: 20px;
    padding: 16px 44px;
    border: 2px solid rgba(122, 74, 108, 0.26);
    box-shadow: 0 8px 0 rgba(122, 74, 108, 0.22);
    text-align: center;
    max-width: 720px;
    position: relative;
    overflow: hidden;
  }
  /* Shimmer sweep on title */
  .title-bar::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.24), transparent);
    animation: title-shimmer 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes title-shimmer {
    0%       { left: -100%; }
    35%, 100% { left: 200%; }
  }
  .title-category {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 999px;
    margin-bottom: 6px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .title-text {
    color: #fff;
    font-weight: 900;
    font-size: 26px;
    text-shadow: 0 2px 0 rgba(122, 74, 108, 0.24);
    letter-spacing: 0.02em;
  }

  /* Right: Clock */
  .clock-badge {
    background: var(--paper);
    border-radius: 14px;
    padding: 12px 22px;
    color: var(--ink);
    font-weight: 700;
    font-size: 20px;
    box-shadow: 0 6px 0 rgba(122, 74, 108, 0.2);
    display: flex;
    align-items: center;
    gap: 10px;
    border: 2px solid var(--line);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
  <div class="header-row">
    <!-- Left: Stats -->
    <div class="stats-col">
      <div class="live-badge">
        <div class="live-dot-wrap">
          <div class="live-dot-ring"></div>
          <div class="live-dot"></div>
        </div>
        <span class="live-text">LIVE</span>
      </div>
      <div class="stat-panel">
        <div class="stat-row">
          <div class="stat-icon viewers">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div>
            <div class="stat-label">視聴者数</div>
            <div class="stat-value" id="viewers">--</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-icon subs">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div>
            <div class="stat-label">登録者数</div>
            <div class="stat-value" id="subs">--</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Center: Title -->
    <div class="title-bar">
      <div class="title-category" id="category">AI観測者</div>
      <div class="title-text" id="title">YUI.A</div>
    </div>

    <!-- Right: Clock -->
    <div class="clock-badge">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span id="clock">--:--:--</span>
    </div>
  </div>

<script>
  /* Clock */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* WebSocket */
  const WS_URLS = [
    'ws://127.0.0.1:31902',
    'ws://localhost:31902',
    'ws://127.0.0.1:31901',
    'ws://localhost:31901'
  ];
  let wsIndex = 0;
  let ws;
  function connect() {
    const url = WS_URLS[wsIndex % WS_URLS.length];
    ws = new WebSocket(url);
    ws.onmessage = (ev) => {
      const d = JSON.parse(ev.data);
      if (d.type === 'config') {
        if (d.character_name) document.getElementById('title').textContent = d.character_name;
        if (d.character_subtitle) document.getElementById('category').textContent = d.character_subtitle;
        if (d.viewer_count != null) {
          document.getElementById('viewers').textContent = Number(d.viewer_count).toLocaleString();
        }
        if (d.subscriber_count != null) {
          document.getElementById('subs').textContent = Number(d.subscriber_count).toLocaleString();
        }
      }
    };
    ws.onclose = () => {
      wsIndex += 1;
      setTimeout(connect, 1500);
    };
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
