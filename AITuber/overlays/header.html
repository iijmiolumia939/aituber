<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Header Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    width: 1920px;
    height: 200px;
  }

  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 20px 28px 0 28px;
    width: 100%;
  }

  /* ── Left: LIVE badge + stats ── */
  .stats-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #ef4444, #ec4899);
    border-radius: 14px;
    padding: 10px 20px;
    box-shadow: 0 4px 20px rgba(239,68,68,0.5);
    width: fit-content;
  }
  .live-dot {
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .live-text {
    color: #fff;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 3px;
  }

  .stat-panel {
    background: rgba(17,17,27,0.9);
    backdrop-filter: blur(14px);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
  }
  .stat-icon.viewers { background: #8b5cf6; }
  .stat-icon.subs { background: #ec4899; }
  .stat-label { color: #9ca3af; font-size: 11px; }
  .stat-value { color: #fff; font-weight: 700; font-size: 22px; line-height: 1; }

  /* ── Center: Title ── */
  .title-bar {
    background: linear-gradient(135deg, rgba(124,58,237,0.92), rgba(219,39,119,0.92), rgba(124,58,237,0.92));
    backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 16px 40px;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(124,58,237,0.45);
    text-align: center;
    max-width: 720px;
  }
  .title-category {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 999px;
    margin-bottom: 6px;
  }
  .title-text {
    color: #fff;
    font-weight: 900;
    font-size: 24px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }

  /* ── Right: Clock ── */
  .clock-badge {
    background: rgba(17,17,27,0.9);
    backdrop-filter: blur(14px);
    border-radius: 14px;
    padding: 12px 22px;
    color: #fff;
    font-weight: 700;
    font-size: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .clock-icon { font-size: 18px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="header-row">
    <!-- Left: Stats -->
    <div class="stats-col">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
      </div>
      <div class="stat-panel">
        <div class="stat-row">
          <div class="stat-icon viewers">👁</div>
          <div>
            <div class="stat-label">視聴者数</div>
            <div class="stat-value" id="viewers">--</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-icon subs">👥</div>
          <div>
            <div class="stat-label">登録者数</div>
            <div class="stat-value" id="subs">--</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Center: Title -->
    <div class="title-bar">
      <div class="title-category" id="category">AI観測者</div>
      <div class="title-text" id="title">YUI.A</div>
    </div>

    <!-- Right: Clock -->
    <div class="clock-badge">
      <span class="clock-icon">🕐</span>
      <span id="clock">--:--:--</span>
    </div>
  </div>

<script>
  /* Clock */
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* WebSocket */
  const WS_URL = 'ws://127.0.0.1:31901';
  let ws;
  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onmessage = (ev) => {
      const d = JSON.parse(ev.data);
      if (d.type === 'config') {
        if (d.character_name) document.getElementById('title').textContent = d.character_name;
        if (d.character_subtitle) document.getElementById('category').textContent = d.character_subtitle;
        if (d.viewer_count != null) {
          document.getElementById('viewers').textContent = Number(d.viewer_count).toLocaleString();
        }
        if (d.subscriber_count != null) {
          document.getElementById('subs').textContent = Number(d.subscriber_count).toLocaleString();
        }
      }
    };
    ws.onclose = () => setTimeout(connect, 3000);
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
