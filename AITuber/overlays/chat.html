<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Chat Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    width: 420px;
    height: 920px;
  }

  .panel {
    width: 100%;
    height: 100%;
    background: rgba(17,17,27,0.90);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    border: 1px solid rgba(139,92,246,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* Header */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .panel-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #c4b5fd;
    font-weight: 700;
    font-size: 15px;
  }
  .msg-icon {
    width: 28px; height: 28px;
    background: rgba(139,92,246,0.25);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .msg-count {
    background: rgba(139,92,246,0.35);
    color: #c4b5fd;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: none;
  }
  .messages::-webkit-scrollbar { display: none; }

  .msg {
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(31,31,46,0.80);
    animation: fadeIn 0.3s ease-out;
  }
  .msg.member {
    border-left: 3px solid #22c55e;
    background: rgba(34,197,94,0.08);
  }
  .msg.superchat {
    background: linear-gradient(135deg, rgba(234,179,8,0.25), rgba(249,115,22,0.18));
    border: 1px solid rgba(234,179,8,0.35);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
  }
  .msg-author {
    font-size: 12px;
    font-weight: 700;
    color: #c4b5fd;
  }
  .msg-time {
    font-size: 10px;
    color: rgba(156,163,175,0.65);
  }
  .msg-body {
    color: #e5e7eb;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }
  .sc-amount {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(234,179,8,0.30);
    color: #fde68a;
    font-weight: 700;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 999px;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="panel-header">
    <div class="panel-header-left">
      <div class="msg-icon">💬</div>
      ライブチャット
    </div>
    <div class="msg-count" id="count">0</div>
  </div>
  <div class="messages" id="messages"></div>
</div>

<script>
  const msgsEl = document.getElementById('messages');
  const countEl = document.getElementById('count');
  let msgCount = 0;
  const MAX_MSGS = 80;

  function addMsg(author, text, badge, ts) {
    const div = document.createElement('div');
    const isMember = (badge === 'member');
    const isSC = (badge === 'superchat');
    div.className = 'msg' + (isMember ? ' member' : '') + (isSC ? ' superchat' : '');

    const time = ts ? new Date(ts).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}) : '';
    let extra = '';
    if (isSC) extra = '<div class="sc-amount">💰 Super Chat</div>';

    div.innerHTML =
      '<div class="msg-top">' +
        '<span class="msg-author">' + escHtml(author) + '</span>' +
        '<span class="msg-time">' + time + '</span>' +
      '</div>' +
      extra +
      '<div class="msg-body">' + escHtml(text) + '</div>';

    msgsEl.appendChild(div);
    msgCount++;
    countEl.textContent = msgCount;

    /* trim old */
    while (msgsEl.children.length > MAX_MSGS) msgsEl.removeChild(msgsEl.firstChild);

    /* auto-scroll */
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function escHtml(s) {
    const el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }

  /* WebSocket */
  const WS_URL = 'ws://127.0.0.1:31901';
  let ws;
  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onmessage = (ev) => {
      const d = JSON.parse(ev.data);
      if (d.type === 'chat') {
        addMsg(d.author || '匿名', d.text || '', d.badge || '', d.timestamp || '');
      }
    };
    ws.onclose = () => setTimeout(connect, 3000);
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
