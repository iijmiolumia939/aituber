<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subtitle Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap');
  :root {
    --ink: #3b2d43;
    --sub: #7f6a8d;
    --pink: #ff77b7;
    --mint: #31d7b5;
    --paper: rgba(255,255,255,0.82);
    --line: rgba(122,74,108,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'M PLUS Rounded 1c', sans-serif;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  .frame {
    width: 100%;
    height: 100%;
    background: linear-gradient(140deg, #ff92c5, #ffd8ed, #bff6e9, #ff92c5);
    background-size: 300% 300%;
    animation: gradient-shift 7s ease infinite;
    border-radius: 30px;
    padding: 3px;
    display: flex;
    align-items: stretch;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.35s cubic-bezier(0.34,1.4,0.64,1),
                transform 0.35s cubic-bezier(0.34,1.4,0.64,1),
                box-shadow 0.4s ease;
    box-shadow: none;
    position: relative;
    overflow: visible;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50%       { background-position: 100% 50%; }
  }
  .frame.visible {
    opacity: 1;
    transform: translateY(0);
    box-shadow: 0 12px 26px rgba(91, 48, 78, 0.22);
  }

  /* Cloud puffs around the frame */
  .frame::before,
  .frame::after {
    content: '';
    position: absolute;
    pointer-events: none;
    z-index: -1;
    filter: blur(0.4px);
  }
  .frame::before {
    left: -16px;
    right: -16px;
    top: -12px;
    height: 24px;
    background:
      radial-gradient(circle at 8% 100%, rgba(255,255,255,0.85) 0 12px, transparent 13px),
      radial-gradient(circle at 26% 100%, rgba(255,255,255,0.82) 0 11px, transparent 12px),
      radial-gradient(circle at 48% 100%, rgba(255,255,255,0.86) 0 13px, transparent 14px),
      radial-gradient(circle at 71% 100%, rgba(255,255,255,0.83) 0 11px, transparent 12px),
      radial-gradient(circle at 90% 100%, rgba(255,255,255,0.85) 0 12px, transparent 13px);
  }
  .frame::after {
    left: -14px;
    right: -14px;
    bottom: -12px;
    height: 24px;
    background:
      radial-gradient(circle at 12% 0%, rgba(255,255,255,0.82) 0 11px, transparent 12px),
      radial-gradient(circle at 34% 0%, rgba(255,255,255,0.86) 0 13px, transparent 14px),
      radial-gradient(circle at 57% 0%, rgba(255,255,255,0.82) 0 11px, transparent 12px),
      radial-gradient(circle at 79% 0%, rgba(255,255,255,0.84) 0 12px, transparent 13px);
  }

  .cloud-puff {
    position: absolute;
    border-radius: 999px;
    background: rgba(255,255,255,0.78);
    border: 2px solid rgba(122,74,108,0.16);
    pointer-events: none;
    z-index: -1;
    animation: puff-float 5.2s ease-in-out infinite;
  }
  .cloud-puff.p1 { width: 110px; height: 46px; top: -22px; left: 30px; }
  .cloud-puff.p2 { width: 94px; height: 40px; top: -20px; left: 176px; animation-delay: 0.5s; }
  .cloud-puff.p3 { width: 100px; height: 42px; top: -21px; right: 170px; animation-delay: 0.9s; }
  .cloud-puff.p4 { width: 88px; height: 38px; top: -19px; right: 34px; animation-delay: 1.3s; }
  .cloud-puff.p5 { width: 52px; height: 88px; left: -20px; top: 18px; animation-delay: 0.6s; }
  .cloud-puff.p6 { width: 52px; height: 88px; right: -20px; top: 14px; animation-delay: 1.1s; }
  .cloud-puff.p7 { width: 120px; height: 50px; bottom: -24px; left: 84px; animation-delay: 1.6s; }
  .cloud-puff.p8 { width: 124px; height: 52px; bottom: -25px; right: 92px; animation-delay: 1.9s; }

  @keyframes puff-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .inner {
    flex: 1;
    background: var(--paper);
    border-radius: 26px;
    border: 2px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 18px;
    position: relative;
  }

  .inner::after {
    content: '';
    position: absolute;
    left: 90px;
    bottom: -16px;
    width: 28px;
    height: 28px;
    background: var(--paper);
    border-left: 2px solid var(--line);
    border-bottom: 2px solid var(--line);
    transform: rotate(-45deg);
  }

  .inner::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background:
      radial-gradient(circle at 14% 16%, rgba(255,255,255,0.48) 0 8%, transparent 9%),
      radial-gradient(circle at 88% 12%, rgba(255,255,255,0.32) 0 7%, transparent 8%);
    pointer-events: none;
  }

  /* Speaking indicator */
  .speak-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .speak-ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(49,215,181,0.16);
    border: 2.5px solid var(--mint);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .speak-ring::after {
    content: '';
    position: absolute;
    inset: -7px;
    border-radius: 50%;
    border: 1.5px solid rgba(49,215,181,0.46);
    animation: ring-pulse 1.8s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%       { transform: scale(1.3); opacity: 0; }
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 26px;
  }
  .waveform .bar {
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(to top, #1bc2a2, #72efd3);
    animation: wave 1.2s ease-in-out infinite;
  }
  .waveform .bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .waveform .bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  .waveform .bar:nth-child(3) { height: 26px; animation-delay: 0.3s; }
  .waveform .bar:nth-child(4) { height: 16px; animation-delay: 0.45s; }
  .waveform .bar:nth-child(5) { height: 8px;  animation-delay: 0.6s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.35); }
    50%       { transform: scaleY(1); }
  }

  /* Subtitle text */
  .subtitle-text {
    color: var(--ink);
    font-weight: 700;
    font-size: 26px;
    line-height: 1.4;
    flex: 1;
    text-shadow: none;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  /* Name tag */
  .name-tag {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,119,183,0.15);
    border: 2px solid rgba(122,74,108,0.22);
    border-radius: 12px;
    padding: 8px 16px;
    box-shadow: 0 4px 0 rgba(122,74,108,0.14);
  }
  .name-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.6);
    animation: dot-blink 2s ease-in-out infinite;
  }
  @keyframes dot-blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }
  .name-text {
    color: var(--sub);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <span class="cloud-puff p1"></span>
    <span class="cloud-puff p2"></span>
    <span class="cloud-puff p3"></span>
    <span class="cloud-puff p4"></span>
    <span class="cloud-puff p5"></span>
    <span class="cloud-puff p6"></span>
    <span class="cloud-puff p7"></span>
    <span class="cloud-puff p8"></span>
    <div class="inner">
      <div class="speak-indicator">
        <div class="speak-ring">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1bc2a2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </div>
        <div class="waveform">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
      <div class="subtitle-text" id="text"></div>
      <div class="name-tag">
        <div class="name-dot"></div>
        <div class="name-text" id="name">YUI.A</div>
      </div>
    </div>
  </div>

<script>
  const frame = document.getElementById('frame');
  const textEl = document.getElementById('text');
  const nameEl = document.getElementById('name');
  let hideTimer = null;

  function showSubtitle(text, durationMs) {
    textEl.textContent = text;
    frame.classList.add('visible');
    clearTimeout(hideTimer);
    if (durationMs > 0) {
      hideTimer = setTimeout(() => frame.classList.remove('visible'), durationMs);
    }
  }

  function hideSubtitle() {
    frame.classList.remove('visible');
  }

  /* WebSocket */
  const WS_URLS = [
    'ws://127.0.0.1:31902',
    'ws://localhost:31902',
    'ws://127.0.0.1:31901',
    'ws://localhost:31901'
  ];
  let wsIndex = 0;
  let ws;
  function connect() {
    const url = WS_URLS[wsIndex % WS_URLS.length];
    ws = new WebSocket(url);
    ws.onmessage = (ev) => {
      const d = JSON.parse(ev.data);
      if (d.type === 'subtitle') {
        if (d.text) {
          showSubtitle(d.text, (d.duration_sec || 8) * 1000);
        } else {
          hideSubtitle();
        }
      } else if (d.type === 'config') {
        if (d.character_name) nameEl.textContent = d.character_name;
      }
    };
    ws.onclose = () => {
      wsIndex += 1;
      setTimeout(connect, 1500);
    };
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
