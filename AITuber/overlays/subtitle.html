<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Subtitle Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    width: 1200px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .frame {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #7c3aed, #db2777, #7c3aed);
    border-radius: 22px;
    padding: 3px;
    box-shadow: 0 6px 32px rgba(124,58,237,0.45);
    display: flex;
    align-items: stretch;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s, transform 0.35s;
  }
  .frame.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .inner {
    flex: 1;
    background: rgba(17,17,27,0.95);
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 18px;
  }

  /* Speaking indicator */
  .speak-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .speak-ring {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 3px solid #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: ring-pulse 1.8s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
  }
  .speak-ring-inner {
    font-size: 18px;
  }
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 26px;
  }
  .waveform .bar {
    width: 4px;
    border-radius: 2px;
    background: #22c55e;
    animation: wave 1.2s ease-in-out infinite;
  }
  .waveform .bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .waveform .bar:nth-child(2) { height: 16px; animation-delay: 0.15s; }
  .waveform .bar:nth-child(3) { height: 24px; animation-delay: 0.3s; }
  .waveform .bar:nth-child(4) { height: 16px; animation-delay: 0.45s; }
  .waveform .bar:nth-child(5) { height: 8px;  animation-delay: 0.6s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* Subtitle text */
  .subtitle-text {
    color: #fff;
    font-weight: 700;
    font-size: 26px;
    line-height: 1.4;
    flex: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* Name tag */
  .name-tag {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(139,92,246,0.25);
    border: 1px solid rgba(139,92,246,0.4);
    border-radius: 12px;
    padding: 8px 16px;
  }
  .name-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
  }
  .name-text {
    color: #c4b5fd;
    font-weight: 700;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="inner">
      <div class="speak-indicator">
        <div class="speak-ring">
          <span class="speak-ring-inner">🔊</span>
        </div>
        <div class="waveform">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
      <div class="subtitle-text" id="text"></div>
      <div class="name-tag">
        <div class="name-dot"></div>
        <div class="name-text" id="name">YUI.A</div>
      </div>
    </div>
  </div>

<script>
  const frame = document.getElementById('frame');
  const textEl = document.getElementById('text');
  const nameEl = document.getElementById('name');
  let hideTimer = null;

  function showSubtitle(text, durationMs) {
    textEl.textContent = text;
    frame.classList.add('visible');
    clearTimeout(hideTimer);
    if (durationMs > 0) {
      hideTimer = setTimeout(() => frame.classList.remove('visible'), durationMs);
    }
  }

  function hideSubtitle() {
    frame.classList.remove('visible');
  }

  /* WebSocket */
  const WS_URL = 'ws://127.0.0.1:31901';
  let ws;
  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onmessage = (ev) => {
      const d = JSON.parse(ev.data);
      if (d.type === 'subtitle') {
        if (d.text) {
          showSubtitle(d.text, (d.duration_sec || 8) * 1000);
        } else {
          hideSubtitle();
        }
      } else if (d.type === 'config') {
        if (d.character_name) nameEl.textContent = d.character_name;
      }
    };
    ws.onclose = () => setTimeout(connect, 3000);
    ws.onerror = () => ws.close();
  }
  connect();
</script>
</body>
</html>
